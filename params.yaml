# ============================================================================
# params.yaml — exemplo de arquivo de parâmetros para `nextflow run main.nf -params-file params.yaml`
# Todos os campos aqui já têm default equivalente em nextflow.config;
# use este arquivo só para sobrescrever o que for diferente na sua execução.
# ============================================================================

# genome: aponta pro default "${projectDir}/genoma.fa" (nextflow.config) — só
# descomente/edite se o arquivo estiver em outro lugar/nome no seu servidor.
# genome: "genoma.fa"
query_proteins: "reference_queries.fasta"

# Filogenia usa as 4 referências originais + 15 homólogos reais de Urochloa
# (U. humidicola/U. decumbens, 73-88% identidade, baixados via BLASTP em
# 2026-07-09 — ver bin/blastp_top5_homologs.py e blastp_homologs/summary.tsv).
# Fortalece o posicionamento filogenético de locus_001 com parentes próximos
# de verdade, em vez de só arroz/milho/Arabidopsis.
phylo_reference: "reference_queries_expanded_urochloa.fasta"

# Ainda pendente (Decisão 3 do plano científico, gap diferente): expandir com
# TFL1-like/MFT-like das mesmas espécies para discriminar ortologia FT vs.
# parálogos antagonistas — nenhuma sequência baixada até agora resolve isso,
# pois todas as referências (originais + Urochloa novas) são FT-like.
# phylo_reference: "reference_queries_expanded_tfl1_mft.fasta"

outdir: "results"
threads: 32
