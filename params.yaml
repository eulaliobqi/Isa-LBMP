# ============================================================================
# params.yaml — exemplo de arquivo de parâmetros para `nextflow run main.nf -params-file params.yaml`
# Todos os campos aqui já têm default equivalente em nextflow.config;
# use este arquivo só para sobrescrever o que for diferente na sua execução.
# ============================================================================

# genome: aponta pro default "${projectDir}/genoma.fa" (nextflow.config) — só
# descomente/edite se o arquivo estiver em outro lugar/nome no seu servidor.
# genome: "genoma.fa"
query_proteins: "reference_queries.fasta"

# Filogenia usa o conjunto de referência completo (25 seqs, 2026-07-09/10):
#   - 4 FT-like originais (Hd3a, RFT1, ZCN8, FT-Arabidopsis)
#   - 15 homólogos reais de Urochloa (U. humidicola/U. decumbens, 73-88%
#     identidade, via BLASTP restrito a Urochloa[Organism])
#   - 3 TFL1-like verificados por BLASTP (Arabidopsis NP_196004.1, arroz
#     XP_015624118.1 "SELF-PRUNING"/CEN-like, milho NP_001106241.1 ZCN2)
#   - 3 MFT-like verificados por BLASTP (Arabidopsis NP_173250.1, arroz
#     NP_001410922.1, milho NP_001106249.1 ZCN10) — usados como outgroup
#     (ver iqtree_outgroup no nextflow.config) por serem basais ao split
#     FT/TFL1 (Wickland & Hanzawa 2015)
# Resolve a lacuna de discriminação FT vs. TFL1/MFT (Decisão 3 do plano
# científico) e mantém o contexto de parentes próximos de Urochloa.
phylo_reference: "reference_queries_expanded_tfl1_mft.fasta"

outdir: "results"
threads: 32

# Outgroup MFT-like (basal ao split FT/TFL1) pra enraizar a árvore com
# significado biológico de verdade — sem isso o IQ-TREE escreve um Newick
# tecnicamente não-enraizado (foi o que produziu a posição estranha de
# locus_001 "na base" da árvore anterior, sem suporte real).
iqtree_outgroup: "NP_173250.1,NP_001410922.1,NP_001106249.1"
